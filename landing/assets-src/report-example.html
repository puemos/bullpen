I308 charges (~$440M in 2025)","edge":"Both impacted"}],"series":[],"evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","tsmc-cowos-digitimes","hbm-supply-notebookcheck","cuda-vs-rocm-thundercompute","nvda-valuation-gurufocus","amd-valuation-gurufocus"],"display_order":50,"created_at":"2026-04-17T09:03:12.979988+00:00"},{"id":"gross-margin-trend","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"line_chart","title":"Non-GAAP Gross Margin Trajectory: NVDA vs AMD (Quarterly)","summary":"Quarterly non-GAAP gross margin comparison showing NVDA's margin dip during Blackwell ramp and recovery, versus AMD's narrower margin band. NVDA maintains a persistent 15-23pp premium.","columns":[{"key":"quarter","label":"Quarter","unit":null,"description":null},{"key":"nvda_gm","label":"NVDA Non-GAAP GM (%)","unit":null,"description":null},{"key":"amd_gm","label":"AMD Non-GAAP GM (%)","unit":null,"description":null}],"rows":[],"series":[{"label":"NVDA Non-GAAP Gross Margin","points":[{"label":"Q1 FY25","value":78.4,"source_id":null,"metric_id":null},{"label":"Q2 FY25","value":75.7,"source_id":null,"metric_id":null},{"label":"Q3 FY25","value":75.0,"source_id":null,"metric_id":null},{"label":"Q4 FY25","value":73.5,"source_id":null,"metric_id":null},{"label":"Q1 FY26","value":72.8,"source_id":null,"metric_id":null},{"label":"Q2 FY26","value":72.7,"source_id":null,"metric_id":null},{"label":"Q3 FY26","value":73.6,"source_id":null,"metric_id":null},{"label":"Q4 FY26","value":75.2,"source_id":null,"metric_id":null}]},{"label":"AMD Non-GAAP Gross Margin","points":[{"label":"Q1 2024","value":52.0,"source_id":null,"metric_id":null},{"label":"Q2 2024","value":53.0,"source_id":null,"metric_id":null},{"label":"Q3 2024","value":54.0,"source_id":null,"metric_id":null},{"label":"Q4 2024","value":54.0,"source_id":null,"metric_id":null},{"label":"Q1 2025","value":54.0,"source_id":null,"metric_id":null},{"label":"Q2 2025","value":54.0,"source_id":null,"metric_id":null},{"label":"Q3 2025","value":54.0,"source_id":null,"metric_id":null},{"label":"Q4 2025","value":57.0,"source_id":null,"metric_id":null}]}],"evidence_ids":["nvda-q4fy26-pr","nvda-fy25-pr","amd-fy25-pr","amd-fy24-pr"],"display_order":50,"created_at":"2026-04-17T09:03:25.838691+00:00"},{"id":"cowos-allocation-chart","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"bar_chart","title":"2026 Estimated CoWoS Wafer Allocation by Customer","summary":"NVIDIA commands ~60% of estimated global CoWoS demand in 2026, dwarfing AMD's 11% share. This supply dominance underpins NVDA's pricing power and margin structure.","columns":[{"key":"customer","label":"Customer","unit":null,"description":null},{"key":"wafers","label":"CoWoS Wafers (thousands)","unit":"K wafers","description":null}],"rows":[],"series":[{"label":"2026E CoWoS Wafers (K)","points":[{"label":"NVIDIA","value":595.0,"source_id":null,"metric_id":null},{"label":"AMD","value":105.0,"source_id":null,"metric_id":null},{"label":"Others","value":300.0,"source_id":null,"metric_id":null}]}],"evidence_ids":["tsmc-cowos-digitimes","cowos-bottleneck-fusionww"],"display_order":50,"created_at":"2026-04-17T09:03:34.480524+00:00"},{"id":"scenario-matrix","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"scenario_matrix","title":"Scenario Matrix: NVDA vs AMD Relative Positioning Over 12-18 Months","summary":"Three scenarios assessing how AI demand, supply constraints, and competitive dynamics could shift the NVDA/AMD margin and revenue gap over the next 12-18 months.","columns":[{"key":"scenario","label":"Scenario","unit":null,"description":null},{"key":"probability","label":"Probability","unit":null,"description":null},{"key":"nvda_impact","label":"NVDA Impact","unit":null,"description":null},{"key":"amd_impact","label":"AMD Impact","unit":null,"description":null},{"key":"margin_gap","label":"Margin Gap Direction","unit":null,"description":null},{"key":"key_driver","label":"Key Driver","unit":null,"description":null}],"rows":[{"scenario":"Bull: AI Capex Acceleration","probability":0.3,"nvda_impact":"Revenue exceeds $300B FY27; margins sustain 75%+","amd_impact":"DC revenue grows 40%+ but remains <$25B; margins improve to 55-58%","margin_gap":"Stable at ~18-20pp","key_driver":"Hyperscaler capex rises faster than supply, both benefit but NVDA captures lion's share"},{"scenario":"Base: Steady AI Build-Out","probability":0.45,"nvda_impact":"Revenue $270-290B FY27; margins 73-75%","amd_impact":"DC revenue $20-23B; margins 54-56%","margin_gap":"Narrows slightly to ~17-19pp","key_driver":"CoWoS expansion relieves bottleneck somewhat; AMD MI400 gains inference share"},{"scenario":"Bear: Supply Normalization / Demand Pause","probability":0.25,"nvda_impact":"Revenue $230-250B FY27; margins compress to 68-72%","amd_impact":"DC revenue $17-19B; margins 50-53%","margin_gap":"Narrows to ~15-18pp","key_driver":"Hyperscaler capex plateaus; custom ASICs gain share; supply catches up to demand"}],"series":[],"evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","tsmc-cowos-digitimes","cowos-bottleneck-fusionww","nvda-blackwell-margin-lucas8","amd-mi350-seekingalpha"],"display_order":50,"created_at":"2026-04-17T09:04:10.187559+00:00"}],"blocks":[{"id":"thesis-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"thesis","title":"NVDA's Margin Dominance Reflects a Structural Moat, Not Just Supply Scarcity","body":"NVIDIA and AMD are both beneficiaries of the AI compute build-out, but the comparison reveals a widening qualitative gap disguised by AMD's solid absolute growth numbers.\n\n**The margin chasm is the story.** NVIDIA's non-GAAP gross margin exited Q4 FY2026 at 75.2% — recovering fully from the Blackwell ramp trough of ~72.7% — while AMD's best quarter delivered 57%. The operating margin gap is even starker: NVIDIA at ~63.6% versus AMD at ~22.5%. This 41 percentage-point operating margin premium translates to NVIDIA generating $137.3B in non-GAAP operating income on $215.9B in revenue, versus AMD's $7.8B on $34.6B.\n\n**Supply positioning reinforces the margin gap.** NVIDIA has locked in ~60% of TSMC's CoWoS advanced packaging capacity through 2026-27 (595K wafers vs AMD's 105K), and commands ~90% of SK Hynix's HBM output — the highest-quality HBM supplier. AMD relies on Samsung (which failed NVIDIA's HBM3e qualification) and Micron. This supply hierarchy creates a self-reinforcing loop: NVIDIA's scale secures preferential allocation, which sustains its ability to ship at volume, which drives revenue that funds further capacity commitments.\n\n**The CUDA ecosystem is the deeper moat.** While supply constraints will eventually ease as TSMC quadruples CoWoS output, NVIDIA's 20-year CUDA ecosystem (4M+ developers, 3K+ optimized applications, native integration in every major AI framework) creates switching costs that outlast any capacity cycle. ROCm is improving — PyTorch now officially supports it — but remains 10-30% behind on compute-intensive benchmarks and years behind in library breadth.\n\n**AMD is the credible #2, but the gap is structural.** AMD's Data Center segment grew 32% YoY to $16.6B, and the MI350/MI400 roadmap is competitive. But at 1/12th of NVIDIA's Data Center revenue and trading at a 60% forward P/E premium (38.5x vs 24.0x), AMD is priced for a catch-up that supply chain realities and ecosystem dynamics make difficult to achieve at scale.","evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","tsmc-cowos-digitimes","hbm-supply-notebookcheck","cuda-vs-rocm-thundercompute","nvda-valuation-gurufocus","amd-valuation-gurufocus"],"confidence":0.8,"importance":"high","display_order":1,"created_at":"2026-04-17T09:04:32.473128+00:00"},{"id":"peer-comparison-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"peer_comparison","title":"Margin Architecture: Why NVDA Earns Software-Like Returns on Hardware","body":"The financial comparison between NVIDIA and AMD in AI compute reveals fundamentally different business models operating in the same industry.\n\n**Gross margin decomposition:** NVIDIA's 75.2% exit gross margin (Q4 FY2026) versus AMD's 57% reflects several compounding factors:\n- **Pricing power**: NVIDIA's GPUs have no functional equivalent for large-scale AI training, enabling premium ASPs. Blackwell GB300 systems command $30K+ per GPU in configurations where AMD's MI350 competes at lower price points.\n- **Scale efficiencies**: At $193.7B in Data Center revenue, NVIDIA's fixed cost absorption dwarfs AMD's $16.6B base. The 11.7x revenue gap means NVIDIA spreads R&D and manufacturing overhead across dramatically more units.\n- **Supply chain priority**: First-priority access to SK Hynix HBM and TSMC CoWoS likely means better pricing and yield terms than AMD receives from secondary suppliers.\n\n**Operating margin tells the deeper story.** NVIDIA's ~63.6% non-GAAP operating margin vs AMD's ~22.5% shows the compounding effect of gross margin leadership plus operating leverage. NVIDIA spent roughly $37B on R&D and SGA in FY2026 — a huge sum, but only ~17% of revenue. AMD's $7.8B in non-GAAP opex on $34.6B represents ~22.5% of revenue, and AMD must keep investing heavily to close the technology and ecosystem gaps.\n\n**Valuation disconnect:** Despite NVIDIA's superior margins and growth, it trades at 24.0x forward earnings versus AMD's 38.5x. This implies the market expects AMD's growth rate to dramatically outpace NVIDIA's — a bet that requires AMD to overcome both the supply hierarchy and the CUDA moat simultaneously.","evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","nvda-blackwell-margin-lucas8","nvda-valuation-gurufocus","amd-valuation-gurufocus"],"confidence":0.8,"importance":"high","display_order":2,"created_at":"2026-04-17T09:04:49.759177+00:00"},{"id":"supply-chain-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"catalysts","title":"Supply Chain Positioning: CoWoS and HBM Allocation as Competitive Moats","body":"The AI compute supply chain has two critical bottlenecks — TSMC's CoWoS advanced packaging and HBM memory — and NVIDIA dominates access to both. This supply hierarchy is a key driver of the margin gap and has implications for how the competitive landscape evolves.\n\n**CoWoS: NVIDIA's 60% lock on capacity.** TSMC is targeting 130K CoWoS wafers per month by late 2026, roughly quadrupling from late 2024 levels. Despite this expansion, capacity remains sold out. NVIDIA has secured an estimated 595K wafers for 2026 (~60% of global demand), primarily for Blackwell/Rubin architectures using CoWoS-L technology. AMD's allocation of 105K wafers (11% share) limits its ability to scale GPU shipments, even if demand materializes. The remaining ~29% is split among Broadcom, Google, and other ASIC designers.\n\n**HBM: A two-tier supply chain.** SK Hynix controls ~62% of the HBM market and routes approximately 90% of its output to NVIDIA. This gives NVIDIA first access to the highest-yield, most advanced HBM3e and forthcoming HBM4. AMD sources HBM primarily from Samsung (which failed NVIDIA's HBM3e qualification process) and Micron. While both are capable suppliers, Samsung's quality gap with SK Hynix means AMD may face yield or performance disadvantages in memory-intensive AI workloads. HBM prices are rising ~20% for 2026, squeezing margins for all buyers — but NVIDIA's pricing power allows it to pass through costs more effectively.\n\n**What changes the supply picture?**\n- TSMC's CoWoS quadrupling by late 2026 could ease the packaging bottleneck, but demand is growing faster than capacity additions\n- Intel's EMIB/Foveros packaging is being explored as an alternative, but remains unproven at AI accelerator scale\n- Samsung's HBM4 qualification with NVIDIA (reportedly securing 30%+ of supply) could rebalance the memory hierarchy\n- Custom ASICs from hyperscalers (Google TPU, Amazon Trainium, Microsoft Maia) diversify demand away from merchant GPUs, potentially freeing capacity for AMD","evidence_ids":["tsmc-cowos-digitimes","cowos-bottleneck-fusionww","hbm-supply-notebookcheck","hbm-samsung-amd-substack"],"confidence":0.75,"importance":"high","display_order":3,"created_at":"2026-04-17T09:05:11.231783+00:00"},{"id":"ecosystem-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"business_quality","title":"CUDA vs ROCm: The Software Moat That Outlasts Supply Cycles","body":"Supply constraints are cyclical — TSMC will eventually build enough CoWoS capacity, and HBM production will expand. The more durable competitive question is whether NVIDIA's CUDA software ecosystem creates lasting lock-in, or whether AMD's ROCm can erode it over time.\n\n**CUDA's compounding advantages.** Built over nearly 20 years, CUDA has accumulated 4+ million developers, 3,000+ optimized applications, and deep integration into every major AI framework (PyTorch, TensorFlow, JAX). The ecosystem includes specialized libraries — cuDNN, cuBLAS, NCCL, TensorRT, RAPIDS — each representing years of optimization work. This creates powerful switching costs: enterprises that build AI pipelines around CUDA face significant re-engineering costs to migrate to ROCm.\n\n**ROCm's progress is real but insufficient.** AMD has made meaningful strides: PyTorch now officially supports ROCm on Linux, and performance benchmarks show CUDA's lead has narrowed to 10-30% on compute-intensive tasks (from much larger gaps historically). AMD has secured multi-year commitments from OpenAI and engagements with xAI, positioning it as the leading \"second supplier\" for hyperscalers seeking supply diversification.\n\n**The \"good enough\" inflection.** ROCm doesn't need to match CUDA feature-for-feature to gain share. For inference workloads — where model deployment is more standardized than training — the software barrier is lower. Hyperscalers like Meta have explicitly cited supply diversification as a strategic priority, willing to invest engineering effort to avoid single-vendor dependency. This creates an inference-focused beachhead for AMD that could expand over time.\n\n**The training moat remains deep.** For large-scale model training (100B+ parameters), CUDA's multi-GPU communication stack (NCCL) and mature debugging/profiling tools (Nsight) create a gap that ROCm has not yet closed. This is where NVIDIA's margin premium is most defensible.","evidence_ids":["cuda-vs-rocm-thundercompute","amd-mi350-seekingalpha"],"confidence":0.75,"importance":"high","display_order":4,"created_at":"2026-04-17T09:05:32.036389+00:00"},{"id":"risks-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"risks","title":"Key Risks for Both Companies","body":"**Risks to NVIDIA's margin premium:**\n- **Supply normalization compresses pricing power.** As TSMC quadruples CoWoS capacity and HBM production ramps, the scarcity premium embedded in NVIDIA's ASPs could erode. If supply catches demand by late 2027, gross margins could revert toward the high-60s rather than sustaining mid-70s.\n- **Custom ASIC displacement.** Google (TPU), Amazon (Trainium), Microsoft (Maia), and Meta are all investing in custom silicon. If custom ASICs capture 20-30% of hyperscaler AI compute by 2028, NVIDIA's addressable market shrinks — and with it, the revenue base that supports its margin structure.\n- **Export control escalation.** US restrictions already limit China sales. Further tightening or expansion to additional geographies could materially reduce NVIDIA's TAM. China accounted for a significant (though declining) share of data center revenue.\n- **Blackwell yield risks.** While Q4 FY2026 margins recovered to 75.2%, NVIDIA is simultaneously ramping Blackwell Ultra and beginning Rubin development. Any yield issues on next-gen products could trigger another margin trough.\n\n**Risks to AMD's catch-up thesis:**\n- **CoWoS allocation ceiling.** With only 11% of estimated 2026 CoWoS demand, AMD's ability to scale GPU shipments is physically constrained regardless of demand. The MI400 ramp depends on securing more packaging capacity.\n- **HBM quality gap.** Reliance on Samsung (which failed NVIDIA's qualification) introduces potential yield and performance disadvantages in memory bandwidth-sensitive workloads.\n- **Export control impact.** The MI308 already triggered ~$440M in inventory charges in 2025. Further restrictions could disproportionately impact AMD's smaller GPU business.\n- **ROCm adoption stalls.** If ROCm fails to close the ecosystem gap meaningfully, AMD risks being confined to a price-competitive \"second source\" role rather than a genuine alternative, capping its data center margin potential.\n- **Valuation risk.** At 38.5x forward P/E versus NVIDIA's 24.0x, AMD's stock prices in optimistic catch-up assumptions. Any execution stumble or demand slowdown could compress the multiple sharply.","evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","tsmc-cowos-digitimes","hbm-samsung-amd-substack","nvda-valuation-gurufocus","amd-valuation-gurufocus","cowos-bottleneck-fusionww"],"confidence":0.8,"importance":"high","display_order":5,"created_at":"2026-04-17T09:05:53.772276+00:00"},{"id":"open-questions-block","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","kind":"open_questions","title":"Unresolved Questions That Could Shift the Assessment","body":"Several material questions could not be fully resolved with available primary sources:\n\n1. **NVIDIA segment-level operating margins.** NVIDIA reports Data Center revenue but does not disclose segment operating income in earnings releases. The company-level 63.6% operating margin likely overstates Data Center-specific margins (given lower-margin Gaming and Auto segments), but the true figure is unavailable without deeper 10-K analysis.\n\n2. **AMD GPU vs CPU margin decomposition.** AMD's Data Center segment bundles EPYC CPUs and Instinct GPUs. As GPU mix rises, segment operating margins have compressed (29% → 25% in Q3 2025 YoY), but we cannot confirm whether this reflects structural GPU cost disadvantages, ramp-phase economics, or simply product mix shift.\n\n3. **Custom ASIC displacement rate.** The pace at which hyperscalers shift from merchant GPUs to custom silicon (TPU, Trainium, Maia) has significant implications for both companies' TAMs. Reliable market share data is sparse; estimates range from 10-20% ASIC penetration today.\n\n4. **CoWoS allocation terms.** While DigiTimes estimates provide directional allocation figures, the actual commercial terms (pricing, commitment duration, penalty clauses) between NVIDIA/AMD and TSMC are not publicly disclosed. These terms affect the true cost advantage of NVIDIA's dominant allocation position.\n\nNone of these uncertainties are stance-blocking individually, but collectively they introduce moderate uncertainty into the margin sustainability assessment.","evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","tsmc-cowos-digitimes"],"confidence":0.7,"importance":"medium","display_order":6,"created_at":"2026-04-17T09:06:33.686771+00:00"}],"final_stance":{"id":"final-stance","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","stance":"bullish","horizon":"12-18 months","confidence":0.72,"summary":"NVIDIA holds decisive structural advantages over AMD in AI compute margins and supply positioning. A 19pp gross margin premium, 41pp operating margin premium, 60% CoWoS allocation share, and 20-year CUDA ecosystem create compounding advantages that AMD's credible but smaller product roadmap cannot overcome at scale within this horizon. NVIDIA's 24x forward P/E prices in strong but not exceptional growth, while AMD's 38.5x requires a catch-up trajectory that supply chain realities constrain. NVDA is the stronger relative position in AI compute on both fundamentals and valuation.","key_reasons":["NVIDIA's 75% gross margin and 64% operating margin reflect ecosystem lock-in and supply chain priority that are structural, not merely cyclical scarcity effects","NVIDIA commands 60% of CoWoS capacity and 90% of SK Hynix HBM output, creating a supply hierarchy that physically limits AMD's ability to scale even if demand exists","CUDA's 20-year, 4M+ developer ecosystem creates switching costs that ROCm — despite genuine progress — cannot overcome for training workloads within 12-18 months","NVIDIA trades at 24x forward earnings versus AMD's 38.5x, meaning NVDA offers superior margins and growth at a lower valuation multiple","NVIDIA's Q1 FY2027 guidance of $78B implies continued 15%+ sequential growth, with Blackwell Ultra and Rubin providing multi-year product cycle visibility"],"what_would_change":["Evidence that AMD MI400/Helios is winning significant training workload share at top-5 hyperscalers, not just inference or second-source roles","NVIDIA gross margins compressing below 70% for two consecutive quarters, signaling that supply normalization is eroding pricing power faster than expected","Custom ASIC market share exceeding 25% of total AI compute spend, which would pressure NVIDIA's TAM more than AMD's given NVIDIA's premium pricing","AMD securing 20%+ of CoWoS allocation or qualifying with SK Hynix for primary HBM supply, which would remove the key physical constraint on AMD's scaling","Regulatory escalation — broader export controls or antitrust action against NVIDIA's CUDA ecosystem — that structurally levels the competitive playing field"],"disclaimer":"Research only. Not investment advice.","created_at":"2026-04-17T09:07:16.098068+00:00"},"projections":[{"id":"nvda-projection","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","entity_id":"nvda","horizon":"12-18 months (FY2027)","metric":"Data Center Revenue","current_value":193.7,"current_value_label":"FY2026 Data Center Revenue","unit":"$B","scenarios":[{"label":"bull","target_value":310.0,"target_label":"$310B","upside_pct":60.0,"probability":0.3,"rationale":"AI capex accelerates beyond current plans. Blackwell Ultra and early Rubin shipments drive 60%+ YoY growth. Margins sustain at 75%+ as demand outstrips even expanded CoWoS capacity.","catalysts":["Hyperscaler capex budgets increase 30%+ in 2027","Agentic AI and sovereign AI programs drive incremental demand beyond current forecasts","Blackwell Ultra yields exceed expectations, improving margin trajectory"],"risks":["Demand overbuilding leads to inventory correction in late 2027","Export control expansion restricts additional geographies"]},{"label":"base","target_value":270.0,"target_label":"$270B","upside_pct":39.4,"probability":0.45,"rationale":"Steady AI infrastructure build-out continues. CoWoS expansion partially relieves supply constraints but NVIDIA maintains pricing power through ecosystem and product leadership. Margins settle in the 73-75% range.","catalysts":["Blackwell Ultra ramp proceeds on schedule","Enterprise AI adoption broadens beyond hyperscalers","Rubin early samples drive forward orders"],"risks":["Custom ASIC adoption accelerates modestly, taking 15-20% of inference compute","China revenue remains depressed under current export controls"]},{"label":"bear","target_value":230.0,"target_label":"$230B","upside_pct":18.7,"probability":0.25,"rationale":"Hyperscaler capex growth plateaus or declines as ROI scrutiny intensifies. Supply normalization and increased custom ASIC adoption compress pricing power. Margins fall to 68-72% range.","catalysts":["Macro slowdown triggers enterprise AI budget cuts","Google TPU and Amazon Trainium capture significant training share"],"risks":["Revenue still grows 19% YoY even in bear case, reflecting floor of locked-in demand","Margin compression could trigger multiple contraction from 24x forward P/E"]}],"methodology":"Revenue projection based on Q1 FY2027 guidance run-rate ($78B quarterly implies ~$312B annualized), adjusted for seasonal patterns, CoWoS capacity expansion timeline, and product cycle cadence (Blackwell Ultra → Rubin). Historical margin analysis used to frame gross margin range across scenarios.","key_assumptions":["Hyperscaler AI capex continues growing 20-40% YoY through 2027","TSMC CoWoS expansion reaches 130K wafers/month by late 2026 as planned","No material escalation of export controls beyond current scope","Blackwell Ultra and Rubin product cycles execute on schedule","Custom ASICs remain below 25% of total AI compute market share"],"evidence_ids":["nvda-q4fy26-pr","nvda-fy25-pr","tsmc-cowos-digitimes","cowos-bottleneck-fusionww","nvda-blackwell-margin-lucas8"],"confidence":0.65,"disclaimer":"Research only. Not investment advice.","created_at":"2026-04-17T09:07:40.793671+00:00"},{"id":"amd-projection","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","entity_id":"amd","horizon":"12-18 months (FY2026)","metric":"Data Center Revenue","current_value":16.6,"current_value_label":"FY2025 Data Center Revenue","unit":"$B","scenarios":[{"label":"bull","target_value":26.0,"target_label":"$26B","upside_pct":56.6,"probability":0.25,"rationale":"MI400 launch is a breakout success. Hyperscaler diversification accelerates, with OpenAI and Meta deploying AMD at scale for inference. CoWoS allocation increases beyond baseline forecast. Margins expand to 58-60% as GPU economics improve with scale.","catalysts":["MI400/Helios rack-scale wins at 2+ top-5 hyperscalers for training workloads","ROCm achieves feature parity with CUDA for key inference frameworks","AMD secures increased CoWoS allocation from TSMC or qualifies alternative packaging"],"risks":["MI400 delays or yield issues could push timeline out 2+ quarters","38.5x forward P/E leaves little room for execution stumbles"]},{"label":"base","target_value":22.0,"target_label":"$22B","upside_pct":32.5,"probability":0.45,"rationale":"Steady growth driven by MI350 ramp and early MI400 shipments. AMD maintains second-source positioning with gradual share gains in inference. Margins improve modestly to 55-57% as GPU ramp matures and export control charges normalize.","catalysts":["MI350 volumes continue scaling through H1 2026","EPYC Turin gains server CPU share, supporting blended segment growth","Enterprise AI adoption provides incremental demand beyond hyperscalers"],"risks":["NVIDIA Blackwell Ultra outperforms MI400 on key benchmarks, limiting AMD's competitive window","CoWoS allocation of 11% physically caps GPU shipment volumes"]},{"label":"bear","target_value":17.0,"target_label":"$17B","upside_pct":2.4,"probability":0.3,"rationale":"MI400 ramp is delayed or underwhelms. Hyperscalers consolidate around NVIDIA and custom ASICs, leaving AMD as a marginal GPU supplier. Export control charges recur. Margins remain in the 50-53% range.","catalysts":["Macro slowdown or AI capex pause reduces incremental GPU demand","NVIDIA cuts prices on inference-optimized Blackwell SKUs, undercutting AMD's value proposition"],"risks":["EPYC CPU business provides revenue floor even if GPU underperforms","Stagnant data center revenue at 38.5x forward P/E could trigger significant multiple compression"]}],"methodology":"Revenue projection based on FY2025 exit rate ($5.4B Q4 quarterly), MI350/MI400 product cycle timing, CoWoS allocation constraints, and consensus analyst estimates (~$41.9B total AMD revenue for 2026, implying continued Data Center growth. Margin assumptions based on product mix shift between GPU (lower margin, faster growing) and CPU (higher margin, steady).","key_assumptions":["MI400 enters volume production in H2 2026 as planned","AMD CoWoS allocation remains approximately 11% of global demand","Export control impact normalizes (no major new charges beyond MI308)","EPYC CPU market share continues gradual expansion vs Intel","Hyperscaler second-sourcing demand persists as a structural tailwind"],"evidence_ids":["amd-fy25-pr","amd-fy24-pr","amd-mi350-seekingalpha","tsmc-cowos-digitimes","hbm-samsung-amd-substack","cuda-vs-rocm-thundercompute"],"confidence":0.55,"disclaimer":"Research only. Not investment advice.","created_at":"2026-04-17T09:08:01.382155+00:00"}],"counter_theses":[{"id":"a4672e68-5c54-488d-9301-69727c5a3159","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","stance_against":"bullish","summary":"The strongest case against favoring NVDA over AMD rests on three pillars: (1) Supply normalization is inevitable — TSMC is quadrupling CoWoS capacity, and as the packaging bottleneck eases by 2027, NVIDIA's scarcity-driven pricing power will weaken, compressing gross margins toward the high-60s. History shows semiconductor margins mean-revert. (2) AMD's MI400 + Helios rack-scale solution represents a genuine architectural leap with HBM4 (432GB, 19.6 TB/s bandwidth), which could be competitive for inference and fine-tuning workloads where CUDA's training moat matters less. If ROCm reaches \"good enough\" for inference at scale, AMD captures the higher-growth portion of the market. (3) AMD's 38.5x forward P/E already reflects higher growth expectations, but if AMD's data center revenue accelerates from $16.6B to $25B+ by 2027 while expanding margins to 58-60%, the multiple could prove justified — especially if NVIDIA's growth decelerates from 65% to 20-30% as its base grows enormous. The hyperscaler diversification imperative is real: Meta, Microsoft, and OpenAI have all signaled intent to reduce NVIDIA dependency, creating a structural tailwind for AMD.","supporting_evidence_ids":["amd-mi350-seekingalpha","tsmc-cowos-digitimes","cuda-vs-rocm-thundercompute","amd-fy25-pr","cowos-bottleneck-fusionww"],"why_we_reject_or_partially_accept":"We partially accept the supply normalization argument — margins likely settle in the 72-75% range rather than expanding further — but reject the implication that this closes the gap with AMD. Even in a supply-normalized world, NVIDIA's ecosystem lock-in, 11.7x revenue scale advantage, and first-priority HBM access create structural margin advantages that persist beyond the capacity cycle. AMD's valuation at 38.5x forward P/E versus NVDA's 24.0x means AMD must not just grow faster, but dramatically outperform — and supply chain realities (11% CoWoS share, secondary HBM suppliers) cap how fast AMD can scale. The \"second source\" thesis is valid, but second sources historically earn lower margins, not higher multiples.","residual_probability":0.25,"created_at":"2026-04-17T09:06:54.635052+00:00"}],"uncertainty_entries":[{"id":"11a13ff9-a4f1-42a8-b6fd-0e9f516239da","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","question":"What is NVIDIA's actual data center segment operating margin versus company-level operating margin?","why_it_matters":"NVIDIA does not break out operating income by segment in its press releases. The company-level operating margin (~63.6%) may overstate or understate the Data Center segment's true profitability, as Gaming/Auto/Pro Viz segments have different margin profiles.","attempted_resolution":"Reviewed NVIDIA FY2026 press releases and Q4 earnings. NVIDIA reports revenue by segment but does not publicly disclose segment-level operating income. The 10-K may contain additional segment disclosures but was not reviewed in full for this analysis.","blocking":false,"related_decision_criterion":"Does NVDA's data center margin premium over AMD reflect durable competitive advantages or temporary supply scarcity?","created_at":"2026-04-17T09:06:08.514430+00:00"},{"id":"7aa58d01-2af3-4748-a9cd-7cce39b9f292","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","question":"How much of AMD's data center operating margin compression is due to GPU mix shift versus structural cost disadvantages?","why_it_matters":"AMD's Data Center segment includes both EPYC CPUs (higher margin, mature) and Instinct GPUs (lower margin, ramping). As GPU mix increases, segment margins could compress even as GPU economics improve on a standalone basis. Understanding this decomposition is critical to assessing AMD's margin trajectory.","attempted_resolution":"AMD does not publicly break out GPU vs CPU profitability within the Data Center segment. Q3 2025 data center operating margin declined from 29% to 25% YoY, coinciding with MI350 ramp, suggesting GPU mix is dilutive — but this is inferential, not confirmed.","blocking":false,"related_decision_criterion":"Is AMD's AI compute revenue trajectory closing the gap with NVDA in a way that justifies its current valuation?","created_at":"2026-04-17T09:06:13.756627+00:00"},{"id":"ff3adf7c-cfb4-49a9-a75e-30a48955bace","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","question":"What share of hyperscaler AI compute capex is shifting toward custom ASICs versus merchant GPUs?","why_it_matters":"If custom ASICs (Google TPU, Amazon Trainium, Microsoft Maia) are capturing an accelerating share of AI training/inference compute, both NVDA and AMD face TAM pressure — but NVDA's premium margins would be more vulnerable to displacement in price-sensitive inference workloads.","attempted_resolution":"Industry reports suggest custom ASICs are growing but still represent a minority of total AI compute spend. No authoritative market share breakdown between merchant GPU and custom ASIC was found with reliable sourcing. Estimates range from 10-20% ASIC share currently.","blocking":false,"related_decision_criterion":"What is the risk that supply normalization compresses NVDA's exceptional margins toward historical levels?","created_at":"2026-04-17T09:06:18.435850+00:00"}],"methodology_note":{"id":"4b6abda6-1cb6-4f18-bd3c-8b2367945f96","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","approach":"Comparative fundamental analysis of NVIDIA and AMD focused on AI compute segment economics and supply chain positioning. We evaluate margin structure, revenue growth trajectories, supply chain dependencies, and ecosystem moats to assess relative positioning. Financial data is drawn from SEC filings (10-K, 10-Q) and supplemented by industry supply chain reporting and consensus estimates.","frameworks":["Gross/operating margin decomposition by segment","Supply chain bottleneck analysis (CoWoS, HBM, TSMC allocation)","Ecosystem moat assessment (CUDA vs ROCm)","Product cycle analysis (Blackwell vs MI300/MI350)","Relative valuation on forward earnings and revenue multiples"],"data_windows":["NVDA FY2025 10-K (ending Jan 2025) and FY2026 Q1 if available","AMD FY2024 10-K (ending Dec 2024) and Q1 2025 10-Q if available","TSMC capacity and capex disclosures through Q1 2025","Consensus estimates as of April 2026","HBM supply chain reports through early 2026"],"known_limitations":["Segment-level margin breakdowns are limited by company disclosure granularity — NVDA does not break out AI-specific margins within Data Center","Supply allocation data between NVDA and AMD at TSMC is not publicly disclosed at a granular level","Consensus estimates reflect sell-side models that may lag rapid AI demand shifts","ROCm adoption metrics are not systematically reported, requiring inference from anecdotal evidence","Data may lag current quarter given filing timelines — most recent confirmed data is Q4 FY2025 for NVDA and Q4 2024 for AMD"],"created_at":"2026-04-17T08:59:34.520902+00:00"},"decision_criterion_answers":[{"id":"9b71879c-1d75-4374-9318-74c35fcc8e3c","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","criterion":"Does NVDA's data center margin premium over AMD reflect durable competitive advantages or temporary supply scarcity?","verdict":"confirmed","summary":"NVIDIA's 19pp gross margin and 41pp operating margin premium over AMD reflects a combination of durable structural advantages and cyclical supply scarcity. The structural component — CUDA ecosystem lock-in, 11.7x revenue scale efficiencies, and first-priority supply chain access — will persist even as CoWoS capacity expands. The cyclical component (scarcity-driven pricing power) may soften margins from 75% toward 72-73%, but the floor remains far above AMD's ceiling. Even NVIDIA's Blackwell ramp trough of ~72.7% exceeded AMD's best-ever quarterly margin of 57%.","supporting_block_ids":["thesis-block","peer-comparison-block","ecosystem-block"],"supporting_evidence_ids":["nvda-q4fy26-pr","amd-fy25-pr","cuda-vs-rocm-thundercompute","nvda-blackwell-margin-lucas8"],"created_at":"2026-04-17T09:08:12.527934+00:00"},{"id":"4646e66d-c2df-46c6-a369-8cd62a9ea81b","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","criterion":"Which company faces greater supply constraint risk from TSMC advanced packaging (CoWoS) and HBM memory bottlenecks?","verdict":"confirmed","summary":"AMD faces substantially greater supply constraint risk. With only 11% of estimated 2026 CoWoS demand (105K wafers vs NVIDIA's 595K), AMD's ability to scale GPU shipments is physically capped regardless of demand. AMD's reliance on Samsung (which failed NVIDIA's HBM3e qualification) and Micron for HBM introduces potential quality and yield disadvantages. NVIDIA's dominant supply position is self-reinforcing: its revenue scale funds capacity commitments that secure priority access, which drives more revenue. However, TSMC's planned quadrupling of CoWoS capacity could partially ease AMD's constraints by late 2026-2027.","supporting_block_ids":["supply-chain-block","thesis-block"],"supporting_evidence_ids":["tsmc-cowos-digitimes","cowos-bottleneck-fusionww","hbm-supply-notebookcheck","hbm-samsung-amd-substack"],"created_at":"2026-04-17T09:08:19.677080+00:00"},{"id":"735a503b-9d75-4de5-92a9-30b4759d6078","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","criterion":"Is AMD's AI compute revenue trajectory closing the gap with NVDA in a way that justifies its current valuation?","verdict":"partially_confirmed","summary":"AMD's data center revenue is growing (32% YoY to $16.6B) and the MI350/MI400 roadmap is credible. AMD has secured meaningful design wins (OpenAI, xAI, Meta). However, the revenue gap is widening in absolute terms — NVIDIA's Data Center grew from $115.2B to $193.7B (+$78.5B) while AMD grew from $12.6B to $16.6B (+$4.0B). At 38.5x forward P/E versus NVIDIA's 24.0x, AMD must deliver dramatically superior growth to justify the valuation premium. Supply constraints (11% CoWoS share) and ecosystem gaps (ROCm 10-30% behind CUDA) create real ceilings on how fast AMD can close the gap. The revenue trajectory is positive but the valuation asks for more than the fundamentals currently support.","supporting_block_ids":["thesis-block","peer-comparison-block","risks-block"],"supporting_evidence_ids":["amd-fy25-pr","amd-fy24-pr","nvda-q4fy26-pr","amd-valuation-gurufocus","nvda-valuation-gurufocus","tsmc-cowos-digitimes"],"created_at":"2026-04-17T09:08:26.819552+00:00"},{"id":"ed3a6170-a193-4af3-8e56-a776d264aae1","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","criterion":"How do CUDA ecosystem lock-in vs ROCm adoption trends affect long-term margin sustainability?","verdict":"confirmed","summary":"CUDA's ecosystem lock-in is the most durable component of NVIDIA's margin premium and will sustain superior margins beyond any single supply cycle. With 4M+ developers, 3K+ optimized applications, and 20 years of accumulated libraries, CUDA creates switching costs that are measured in years of re-engineering effort. ROCm has made genuine progress — PyTorch official support, 10-30% performance gap (narrowed from larger historical gaps) — but remains years behind in ecosystem breadth. The key nuance: ROCm may reach \"good enough\" for inference workloads (lower ecosystem bar), creating a beachhead for AMD. But for large-scale training (100B+ parameter models), CUDA's NCCL multi-GPU stack and Nsight tooling remain decisive advantages that protect NVIDIA's highest-margin workloads.","supporting_block_ids":["ecosystem-block","thesis-block"],"supporting_evidence_ids":["cuda-vs-rocm-thundercompute","amd-mi350-seekingalpha"],"created_at":"2026-04-17T09:08:34.397421+00:00"},{"id":"f046dfb2-359f-4548-9e7e-7a10eb967c7f","run_id":"e5423b45-3678-426a-a54a-03b03d37497c","criterion":"What is the risk that supply normalization compresses NVDA's exceptional margins toward historical levels?","verdict":"partially_confirmed","summary":"Supply normalization is a real but bounded risk. TSMC is quadrupling CoWoS capacity to 130K wafers/month by late 2026, and HBM production is expanding across all three vendors. As supply catches demand (likely by 2027-2028), NVIDIA's scarcity-driven pricing premium will erode. However, \"historical levels\" is misleading — NVIDIA's pre-AI-boom gross margins were 60-65%, but the current product mix (90% Data Center, CUDA-locked customers) is fundamentally different from the gaming-dominated era. A realistic floor is 68-72% in a bear case, not a reversion to 60s. The margin compression risk is real (we model 25% probability of bear case), but the floor remains well above AMD's ceiling and well above NVIDIA's own historical norms.","supporting_block_ids":["risks-block","thesis-block","supply-chain-block"],"supporting_evidence_ids":["nvda-q4fy26-pr","nvda-fy25-pr","tsmc-cowos-digitimes","cowos-bottleneck-fusionww","nvda-blackwell-margin-lucas8"],"created_at":"2026-04-17T09:08:41.645608+00:00"}]})return null;if(typeof t=="string")try{return JSON.parse(t)}catch{return null}return t}function l3({title:t,body:i}){return S.jsxs("div",{className:"mx-auto flex min-h-screen max-w-xl flex-col justify-center gap-4 px-8 py-16",children:[S.jsx("p",{className:"font-mono text-[10.5px] uppercase tracking-[0.18em] text-muted-foreground",children:"Bullpen · Shared report"}),S.jsx("h1",{className:"text-[34px] font-semibold leading-[1.05] tracking-[-0.02em]",children:t}),S.jsx("p",{className:"max-w-[62ch] text-[14.5px] leading-[1.55] text-muted-foreground",children:i})]})}const $b=document.getElementById("root");if(!$b)throw new Error("#root missing");const Ku=n3(),Ry=Ev.createRoot($b);Ku?.analysis?.id?(Av({selectedReport:Ku,selectedAnalysisId:Ku.analysis.id}),Ry.render(S.jsx(cf.StrictMode,{children:S.jsx(t3,{report:Ku})}))):Ry.render(S.jsx(cf.StrictMode,{children:S.jsx(l3,{title:"No report embedded",body:"This standalone HTML file does not contain a report payload."})}));</script>
